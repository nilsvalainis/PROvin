<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept 13 — Bento Grid (iOS style)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/concept-demos/concept-13/styles.css" />
  
</head>
<body class="min-h-screen antialiased concept-13">
  <a href="#main" class="absolute -left-[9999px] top-0 z-50 overflow-hidden whitespace-nowrap focus:left-4 focus:top-4 focus:h-auto focus:w-auto focus:overflow-visible focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-black">Skip to content</a>
  <main id="main" class="relative isolate min-h-screen w-full">
  <div id="demo-shell" class="min-h-screen w-full">

    <div class="page mx-auto w-full max-w-6xl px-4 py-8 sm:px-6 sm:py-10">
      <header><h1>Bento audit</h1><p id="clk" class="clk"></p></header>
      <div class="bento">
        <div class="tile a"><h2>VIN</h2><p>17 chars unlock the deck.</p><input maxlength="17" placeholder="·················" /></div>
        <div class="tile b"><h2>Risk</h2><p>Demo heat: <strong>Low</strong></p></div>
        <div class="tile c"><h2>Mileage</h2><p>Demo curve stable.</p></div>
        <div class="tile d"><h2>Listings</h2><p>3 clusters matched.</p></div>
        <div class="tile e"><h2>Export</h2><p>PDF / CSV placeholders.</p></div>
      </div>
    </div>
  </div>
  </main>
  <script src="/concept-demos/concept-13/script.js" defer></script>
</body>
</html>
