<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept 18 — Video-first landing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/concept-demos/concept-18/styles.css" />
  
</head>
<body class="min-h-screen antialiased concept-18 font-sans text-white">
  <a href="#main" class="absolute -left-[9999px] top-0 z-50 overflow-hidden whitespace-nowrap focus:left-4 focus:top-4 focus:h-auto focus:w-auto focus:overflow-visible focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-black">Skip to content</a>
  <main id="main" class="relative isolate min-h-screen w-full">
  <div id="demo-shell" class="min-h-screen w-full">

    <div class="stage relative min-h-screen w-full overflow-hidden text-white">
      <video class="bg" autoplay muted loop playsinline>
        <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm" type="video/webm" />
      </video>
      <div class="scrim"></div>
      <div class="ui">
        <h1>See the story move.</h1>
        <p>Replace with your own clip in <code>assets/</code> for production.</p>
        <a class="btn" href="#vin">Continue</a>
        <div id="vin" class="vin"><input maxlength="17" placeholder="VIN" /></div>
      </div>
    </div>
  </div>
  </main>
  <script src="/concept-demos/concept-18/script.js" defer></script>
</body>
</html>
