<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept 27 — Gamified experience</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/concept-demos/concept-27/styles.css" />
  
</head>
<body class="min-h-screen antialiased concept-27">
  <a href="#main" class="absolute -left-[9999px] top-0 z-50 overflow-hidden whitespace-nowrap focus:left-4 focus:top-4 focus:h-auto focus:w-auto focus:overflow-visible focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-black">Skip to content</a>
  <main id="main" class="relative isolate min-h-screen w-full">
  <div id="demo-shell" class="min-h-screen w-full">

    <div class="wrap mx-auto w-full max-w-6xl px-4 py-6 sm:px-6 sm:py-8">
      <div class="bar"><div id="fill" class="fill"></div></div>
      <section id="s0" class="step">
        <h1>VIN quest</h1>
        <p>Demo gamification — no backend.</p>
        <input id="vin" maxlength="17" placeholder="Enter VIN" />
        <button type="button" data-next>Next</button>
      </section>
      <section id="s1" class="step hidden">
        <h2>Scanning registries…</h2>
        <p>Synthetic progress animation.</p>
        <button type="button" data-next>Next</button>
      </section>
      <section id="s2" class="step hidden">
        <h2>Report ready (fake)</h2>
        <p>You finished the demo flow.</p>
        <button type="button" id="reset">Play again</button>
      </section>
    </div>
  </div>
  </main>
  <script src="/concept-demos/concept-27/script.js" defer></script>
</body>
</html>
