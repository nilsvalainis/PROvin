<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept 24 — 3D Card Interaction</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/concept-demos/concept-24/styles.css" />
  
</head>
<body class="min-h-screen antialiased concept-24">
  <a href="#main" class="absolute -left-[9999px] top-0 z-50 overflow-hidden whitespace-nowrap focus:left-4 focus:top-4 focus:h-auto focus:w-auto focus:overflow-visible focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-black">Skip to content</a>
  <main id="main" class="relative isolate min-h-screen w-full">
  <div id="demo-shell" class="min-h-screen w-full">

    <div class="stage grid min-h-screen w-full place-items-center px-4 py-8 text-white">
      <div id="card" class="card" tabindex="0">
        <p class="eyebrow">PROVIN</p>
        <h2>VIN dossier</h2>
        <p>Move the pointer across the card.</p>
        <span class="shine" aria-hidden="true"></span>
      </div>
    </div>
  </div>
  </main>
  <script src="/concept-demos/concept-24/script.js" defer></script>
</body>
</html>
