<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept 17 — Scroll storytelling</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/concept-demos/concept-17/styles.css" />
  
</head>
<body class="min-h-screen antialiased concept-17 bg-[#020308] font-sans text-[#e9edf5]">
  <a href="#main" class="absolute -left-[9999px] top-0 z-50 overflow-hidden whitespace-nowrap focus:left-4 focus:top-4 focus:h-auto focus:w-auto focus:overflow-visible focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-black">Skip to content</a>
  <main id="main" class="relative isolate min-h-screen w-full">
  <div id="demo-shell" class="min-h-screen w-full">

    <div class="story min-h-screen w-full overflow-x-hidden bg-[#020308] text-[#e9edf5]">
      <section class="panel p1"><div class="blob"></div><h1>Read the car<br/>like a brief.</h1></section>
      <section class="panel p2"><h2>Registries</h2><p>Cross-check stamps across EU clusters — demo copy.</p></section>
      <section class="panel p3"><h2>Dealers</h2><p>Independent chains leave fingerprints — demo copy.</p></section>
      <section class="panel p4"><h2>Listings</h2><p>Marketplaces echo mileage claims — demo copy.</p></section>
    </div>
  </div>
  </main>
  <script src="/concept-demos/concept-17/script.js" defer></script>
</body>
</html>
