<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept 11 — Futuristic Orb</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/concept-demos/concept-11/styles.css" />
  
</head>
<body class="min-h-screen antialiased concept-11 bg-[radial-gradient(circle_at_50%_20%,#0b1530,#020308)] font-sans text-[#e8eefc]">
  <a href="#main" class="absolute -left-[9999px] top-0 z-50 overflow-hidden whitespace-nowrap focus:left-4 focus:top-4 focus:h-auto focus:w-auto focus:overflow-visible focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-black">Skip to content</a>
  <main id="main" class="relative isolate min-h-screen w-full">
  <div id="demo-shell" class="min-h-screen w-full">

    <div class="wrap mx-auto flex w-full max-w-6xl flex-col items-center justify-center gap-6 px-4 py-6 sm:px-6 sm:py-8">
      <canvas id="orb" width="900" height="520" aria-label="Animated orb"></canvas>
      <div class="copy">
        <h1>Orbital VIN scan</h1>
        <p>Soft pulsing field — demo shader-ish look in 2D.</p>
        <input id="vin" maxlength="17" placeholder="Optional VIN label" />
      </div>
    </div>
  </div>
  </main>
  <script src="/concept-demos/concept-11/script.js" defer></script>
</body>
</html>
