<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept 05 — Cyberpunk Neon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/concept-demos/concept-05/styles.css" />
  
</head>
<body class="min-h-screen antialiased concept-05">
  <a href="#main" class="absolute -left-[9999px] top-0 z-50 overflow-hidden whitespace-nowrap focus:left-4 focus:top-4 focus:h-auto focus:w-auto focus:overflow-visible focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-black">Skip to content</a>
  <main id="main" class="relative isolate min-h-screen w-full">
  <div id="demo-shell" class="min-h-screen w-full">

    <div class="crt relative min-h-screen w-full overflow-hidden font-mono text-[#e6f7ff]">
      <div class="scan" aria-hidden="true"></div>
      <div class="wrap mx-auto w-full max-w-6xl px-4 py-6 sm:px-6 sm:py-8">
        <p class="mono">// PROVIN_NET //</p>
        <h1 class="glitch" data-text="VIN_TRACE">VIN_TRACE</h1>
        <p class="sub">Neon audit lane — synthetic traffic only.</p>
        <div class="panel"><span class="pill">LIVE</span><input id="vin" maxlength="17" placeholder="ENTER_VIN" /><button id="hack" type="button">PULSE</button></div>
        <pre id="log" class="log"></pre>
      </div>
    </div>
  </div>
  </main>
  <script src="/concept-demos/concept-05/script.js" defer></script>
