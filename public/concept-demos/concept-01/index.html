<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept 01 — Glassmorphism Premium Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/concept-demos/concept-01/styles.css" />
  
</head>
<body class="min-h-screen antialiased concept-01 font-sans">
  <a href="#main" class="absolute -left-[9999px] top-0 z-50 overflow-hidden whitespace-nowrap focus:left-4 focus:top-4 focus:h-auto focus:w-auto focus:overflow-visible focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-black">Skip to content</a>
  <main id="main" class="relative isolate min-h-screen w-full">
  <div id="demo-shell" class="min-h-screen w-full">

    <header class="hero mx-auto flex w-full max-w-6xl flex-col gap-3 px-4 py-8 sm:px-6">
      <p class="eyebrow">PROVIN · concept demo</p>
      <h1>Vehicle intelligence</h1>
      <p class="lede">Paste a VIN — preview a premium glass dashboard.</p>
      <div class="vin-row">
        <input id="vin" class="vin" maxlength="17" placeholder="WVWZZZ1JZ3W386752" autocomplete="off" />
        <button type="button" id="decode" class="btn">Analyze</button>
      </div>
    </header>
    <section class="grid mx-auto mt-8 grid w-full max-w-6xl grid-cols-1 gap-4 px-4 sm:grid-cols-2 sm:px-6">
      <article class="glass card">
        <h2>Risk snapshot</h2>
        <p class="muted">Synthetic demo data.</p>
        <div id="panel" class="panel" hidden>
          <dl>
            <div><dt>Region</dt><dd id="p-region">—</dd></div>
            <div><dt>Checks</dt><dd id="p-checks">—</dd></div>
            <div><dt>Flags</dt><dd id="p-flags">—</dd></div>
          </dl>
        </div>
      </article>
      <article class="glass card">
        <h2>Mileage signal</h2>
        <div class="spark" aria-hidden="true"></div>
        <p class="muted">Hover cards for micro-interactions.</p>
      </article>
    </section>
  </div>
  </main>
  <script src="/concept-demos/concept-01/script.js" defer></script>
</body>
</html>
