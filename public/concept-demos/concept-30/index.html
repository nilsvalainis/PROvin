<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept 30 — Experimental AI generative UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/concept-demos/concept-30/styles.css" />
  
</head>
<body class="min-h-screen antialiased concept-30 bg-[var(--bg)] font-sans text-[var(--fg)]">
  <a href="#main" class="absolute -left-[9999px] top-0 z-50 overflow-hidden whitespace-nowrap focus:left-4 focus:top-4 focus:h-auto focus:w-auto focus:overflow-visible focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-black">Skip to content</a>
  <main id="main" class="relative isolate min-h-screen w-full">
  <div id="demo-shell" class="min-h-screen w-full">

    <div id="root" class="root mx-auto grid w-full max-w-4xl gap-4 px-4 py-8 sm:px-6 sm:py-10">
      <section data-block="hero" class="block"><h1>Generative shell</h1><p>Reload to re-roll.</p></section>
      <section data-block="vin" class="block"><label>VIN</label><input maxlength="17" /></section>
      <section data-block="cta" class="block"><button type="button" id="roll">Re-roll without reload</button></section>
    </div>
  </div>
  </main>
  <script src="/concept-demos/concept-30/script.js" defer></script>
</body>
</html>
