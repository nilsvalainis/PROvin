<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept 14 — Minimal form-first</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/concept-demos/concept-14/styles.css" />
  
</head>
<body class="min-h-screen antialiased concept-14 grid min-h-screen place-items-center bg-white font-sans text-[#0a0a0a]">
  <a href="#main" class="absolute -left-[9999px] top-0 z-50 overflow-hidden whitespace-nowrap focus:left-4 focus:top-4 focus:h-auto focus:w-auto focus:overflow-visible focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-black">Skip to content</a>
  <main id="main" class="relative isolate min-h-screen w-full">
  <div id="demo-shell" class="min-h-screen w-full">

    <div class="wrap mx-auto w-full max-w-6xl px-4 py-6 sm:px-6 sm:py-8">
      <label for="vin">Vehicle Identification Number</label>
      <input id="vin" inputmode="text" autocomplete="off" maxlength="17" spellcheck="false" />
      <p id="msg" class="msg" role="status"></p>
    </div>
  </div>
  </main>
  <script src="/concept-demos/concept-14/script.js" defer></script>
</body>
</html>
