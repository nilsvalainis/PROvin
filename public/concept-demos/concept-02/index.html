<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept 02 — AI Assistant Landing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/concept-demos/concept-02/styles.css" />
  
</head>
<body class="min-h-screen antialiased concept-02">
  <a href="#main" class="absolute -left-[9999px] top-0 z-50 overflow-hidden whitespace-nowrap focus:left-4 focus:top-4 focus:h-auto focus:w-auto focus:overflow-visible focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-black">Skip to content</a>
  <main id="main" class="relative isolate min-h-screen w-full">
  <div id="demo-shell" class="min-h-screen w-full">

    <div class="shell grid min-h-0 w-full max-w-6xl grid-cols-1 text-[#e7e9ee] md:min-h-screen md:grid-cols-[220px_1fr]">
      <aside class="rail"><div class="logo">PROVIN</div><p class="tiny">Concept demo — not a live model.</p></aside>
      <section class="chat">
        <header><h1>Auto analyst</h1><p class="sub">Ask about a VIN.</p></header>
        <div id="thread" class="thread" aria-live="polite"></div>
        <form id="f" class="composer">
          <label class="sr-only" for="q">Message</label>
          <input id="q" autocomplete="off" placeholder="Decode WVWZZZ…" />
          <button type="submit">Send</button>
        </form>
      </section>
    </div>
  </div>
  </main>
  <script src="/concept-demos/concept-02/script.js" defer></script>
</body>
</html>
