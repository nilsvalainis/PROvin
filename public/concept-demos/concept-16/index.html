<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept 16 — Hacker Style Terminal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/concept-demos/concept-16/styles.css" />
  
</head>
<body class="min-h-screen antialiased concept-16 bg-black font-mono text-[#33ff66]">
  <a href="#main" class="absolute -left-[9999px] top-0 z-50 overflow-hidden whitespace-nowrap focus:left-4 focus:top-4 focus:h-auto focus:w-auto focus:overflow-visible focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-black">Skip to content</a>
  <main id="main" class="relative isolate min-h-screen w-full">
  <div id="demo-shell" class="min-h-screen w-full">

    <div class="term min-h-screen w-full px-3 py-4 font-mono text-[#33ff66] sm:px-4">
      <div id="log" class="log" aria-live="polite"></div>
      <form id="f" class="row"><span class="prompt">provinc@audit:~$</span><input id="cmd" autocomplete="off" spellcheck="false" /></form>
    </div>
  </div>
  </main>
  <script src="/concept-demos/concept-16/script.js" defer></script>
</body>
</html>
