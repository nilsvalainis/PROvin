<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept 25 — Marketplace comparison view</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/concept-demos/concept-25/styles.css" />
  
</head>
<body class="min-h-screen antialiased concept-25">
  <a href="#main" class="absolute -left-[9999px] top-0 z-50 overflow-hidden whitespace-nowrap focus:left-4 focus:top-4 focus:h-auto focus:w-auto focus:overflow-visible focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-black">Skip to content</a>
  <main id="main" class="relative isolate min-h-screen w-full">
  <div id="demo-shell" class="min-h-screen w-full">

    <div class="wrap mx-auto w-full max-w-6xl px-4 py-6 sm:px-6 sm:py-8">
      <header><h1>Compare listings</h1><button id="swap" type="button">Swap highlights</button></header>
      <div class="grid" id="g">
        <article class="car a"><h2>Listing A</h2><table><tbody>
          <tr><th>Price</th><td>€18,400</td></tr>
          <tr><th>Mileage</th><td class="mile" data-side="a">198k km</td></tr>
          <tr><th>Title</th><td>2014 · Comfort</td></tr>
        </tbody></table></article>
        <article class="car b"><h2>Listing B</h2><table><tbody>
          <tr><th>Price</th><td>€17,900</td></tr>
          <tr><th>Mileage</th><td class="mile" data-side="b">121k km</td></tr>
          <tr><th>Title</th><td>2014 · Comfort</td></tr>
        </tbody></table></article>
      </div>
    </div>
  </div>
  </main>
  <script src="/concept-demos/concept-25/script.js" defer></script>
</body>
</html>
