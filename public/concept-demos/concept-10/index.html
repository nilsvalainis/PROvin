<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept 10 — Card-based modular UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/concept-demos/concept-10/styles.css" />
  
</head>
<body class="min-h-screen antialiased concept-10">
  <a href="#main" class="absolute -left-[9999px] top-0 z-50 overflow-hidden whitespace-nowrap focus:left-4 focus:top-4 focus:h-auto focus:w-auto focus:overflow-visible focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-black">Skip to content</a>
  <main id="main" class="relative isolate min-h-screen w-full">
  <div id="demo-shell" class="min-h-screen w-full">

    <div class="wrap mx-auto w-full max-w-6xl px-4 py-6 sm:px-6 sm:py-8">
      <h1>Modular audit deck</h1>
      <div class="deck">
        <article class="card"><h2>Registries</h2><p>Cross-border stamps.</p><div class="more"><p>Demo detail: synthetic harmonization across EU clusters.</p></div></article>
        <article class="card"><h2>Dealers</h2><p>Workshop graph.</p><div class="more"><p>Demo detail: repeated VIN at independent chains.</p></div></article>
        <article class="card"><h2>Listings</h2><p>Market drift.</p><div class="more"><p>Demo detail: mileage deltas vs photo EXIF (fake).</p></div></article>
      </div>
    </div>
  </div>
  </main>
  <script src="/concept-demos/concept-10/script.js" defer></script>
</body>
</html>
