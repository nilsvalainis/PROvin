<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept 22 — Mobile-first app style</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/concept-demos/concept-22/styles.css" />
  
</head>
<body class="min-h-screen antialiased concept-22 bg-[radial-gradient(circle_at_50%_20%,#1a2444,#05060a)] font-sans text-[#e9edf5]">
  <a href="#main" class="absolute -left-[9999px] top-0 z-50 overflow-hidden whitespace-nowrap focus:left-4 focus:top-4 focus:h-auto focus:w-auto focus:overflow-visible focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-black">Skip to content</a>
  <main id="main" class="relative isolate min-h-screen w-full">
  <div id="demo-shell" class="min-h-screen w-full">

    <div class="stage grid min-h-screen w-full place-items-center px-4 py-8 text-white">
      <div class="phone" aria-label="Phone mockup">
        <div class="notch"></div>
        <div class="screen">
          <header><strong>PROVIN</strong><span>demo</span></header>
          <div id="track" class="track">
            <section class="card"><h2>VIN</h2><p>Swipe ← →</p><input maxlength="17" /></section>
            <section class="card"><h2>Risk</h2><p>Synthetic low.</p></section>
            <section class="card"><h2>Export</h2><p>PDF placeholder.</p></section>
          </div>
          <div class="dots" id="dots"></div>
        </div>
      </div>
    </div>
  </div>
  </main>
  <script src="/concept-demos/concept-22/script.js" defer></script>
</body>
</html>
