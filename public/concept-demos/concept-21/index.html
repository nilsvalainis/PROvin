<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept 21 — Motion-heavy UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/concept-demos/concept-21/styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body class="min-h-screen antialiased concept-21">
  <a href="#main" class="absolute -left-[9999px] top-0 z-50 overflow-hidden whitespace-nowrap focus:left-4 focus:top-4 focus:h-auto focus:w-auto focus:overflow-visible focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-black">Skip to content</a>
  <main id="main" class="relative isolate min-h-screen w-full">
  <div id="demo-shell" class="min-h-screen w-full">

    <div class="wrap mx-auto w-full max-w-6xl px-4 py-6 sm:px-6 sm:py-8">
      <h1 id="h">Motion stress test</h1>
      <p id="p">Tap chips — demo only.</p>
      <div class="chips" id="chips">
        <button type="button" class="chip">Regs</button>
        <button type="button" class="chip">Dealers</button>
        <button type="button" class="chip">Ads</button>
        <button type="button" class="chip">Photos</button>
      </div>
    </div>
  </div>
  </main>
  <script src="/concept-demos/concept-21/script.js" defer></script>
</body>
</html>
